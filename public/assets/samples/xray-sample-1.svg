<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" role="img" aria-labelledby="title desc">
  <title id="title">Chest X-ray Sample 1</title>
  <desc id="desc">Illustrative chest x-ray style image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3f" />
      <stop offset="100%" stop-color="#174b84" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#b9e8ff" stop-opacity="0.85" />
