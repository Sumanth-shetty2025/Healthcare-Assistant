  <rect width="600" height="420" fill="url(#bg)" />
  <ellipse cx="300" cy="180" rx="220" ry="150" fill="url(#glow)" />
  <ellipse cx="235" cy="200" rx="95" ry="130" fill="#d4f0ff" fill-opacity="0.35" />
  <ellipse cx="365" cy="200" rx="95" ry="130" fill="#d4f0ff" fill-opacity="0.35" />
  <rect x="285" y="105" width="30" height="230" rx="15" fill="#d4f0ff" fill-opacity="0.32" />
  <line x1="120" y1="340" x2="480" y2="340" stroke="#8ad1ff" stroke-opacity="0.4" stroke-width="5" />
  <text x="26" y="38" fill="#eaf7ff" font-size="24" font-family="Arial, sans-serif">Sample X-Ray</text>
